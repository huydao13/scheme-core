name: Build Customer Service
run-name: "Build Customer Service — ${{ github.event.inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (ví dụ: v1.0.0, v1.2.3)'
        required: true
        default: 'v1.0.0'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            MODULE=customer-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/customer-service:${{ github.event.inputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/customer-service:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/customer-service:${{ github.sha }}

      - name: Summary
        run: |
          echo "### ✅ Customer Service đã build xong" >> $GITHUB_STEP_SUMMARY
          echo "- Version: \`${{ github.event.inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
